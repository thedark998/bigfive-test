<!DOCTYPE html>

        .container { width: 100%; max-width: 650px; padding: 20px; display: flex; flex-direction: column; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); position: relative; }
        
        #progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-size: 0.9rem; font-weight: bold; color: var(--primary); }
        .progress-bar-bg { background: #e9ecef; height: 8px; border-radius: 4px; margin-bottom: 25px; overflow: hidden; }
        .progress-bar-fill { background: var(--primary); height: 100%; width: 0%; transition: width 0.3s; }
        
        .question-text { font-size: 1.3rem; line-height: 1.5; margin-bottom: 30px; min-height: 90px; color: #1e272e; font-weight: 500; }
        
        .options { display: flex; flex-direction: column; gap: 12px; }
        .option-btn { 
            padding: 16px; cursor: pointer; border: 2px solid #edeff2; border-radius: 14px; 
            background: white; transition: all 0.2s; text-align: left; font-size: 1rem;
            display: flex; align-items: center; width: 100%;
        }
        .option-btn:hover { border-color: var(--primary); background: #f8fbff; }
        .option-btn.selected { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 4px 12px rgba(0,123,255,0.3); }
        
        .kb-shortcut { 
            display: inline-block; width: 28px; height: 28px; border: 1px solid #dee2e6; 
            border-radius: 6px; text-align: center; margin-right: 15px; font-size: 0.85rem; line-height: 26px; font-weight: bold;
        }
        .selected .kb-shortcut { border-color: rgba(255,255,255,0.5); }

        .controls { margin-top: 35px; display: flex; justify-content: space-between; gap: 15px; }
        .btn-nav { flex: 1; padding: 16px; border: none; border-radius: 14px; font-weight: bold; cursor: pointer; font-size: 1rem; transition: 0.2s; }
        .btn-prev { background: #f1f3f5; color: #495057; }
        .btn-next { background: var(--primary); color: white; }
        .btn-nav:disabled { opacity: 0.4; cursor: not-allowed; }

        .hidden { display: none; }
        
        /* Risultati e Revisione */
        .trait-result { background: #f8f9fa; padding: 15px; border-radius: 12px; margin-bottom: 12px; }
        .bar-container { background: #dee2e6; height: 12px; border-radius: 6px; margin-top: 8px; overflow: hidden; }
        .bar-fill { height: 100%; background: var(--success); transition: width 1s ease-out; }
        #review-list { margin-top: 20px; max-height: 400px; overflow-y: auto; border-top: 1px solid #eee; }
        .review-item { padding: 12px; border-bottom: 1px solid #f1f1f1; display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; cursor: pointer; }
        .review-item:hover { background: #fdfdfd; }

        @media (max-width: 480px) {
            .kb-shortcut { display: none; }
            .question-text { font-size: 1.15rem; }
            .card { padding: 20px; }
        }
    </style>
</head>

    "O": "Apertura Mentale",
    "L": "Scala Lie (Affidabilità)"
};

let curIdx = 0;
let answers = {};

// Rendering Domanda
function render() {
    const q = questions[curIdx];
    const progress = Math.round((Object.keys(answers).length / questions.length) * 100);
    
    document.getElementById('progress-text').innerText = `Domanda ${curIdx + 1} / ${questions.length}`;
    document.getElementById('percentage').innerText = `${progress}% completato`;
    document.getElementById('bar').style.width = `${((curIdx + 1) / questions.length) * 100}%`;
    document.getElementById('q-text').innerText = q.text;
    
    const box = document.getElementById('options-box');
    box.innerHTML = '';
    labels.forEach((text, i) => {
        const val = i + 1;
        const btn = document.createElement('button');
        btn.className = `option-btn ${answers[q.id] === val ? 'selected' : ''}`;
        btn.innerHTML = `<span class="kb-shortcut">${val}</span> ${text}`;
        btn.onclick = () => { answers[q.id] = val; setTimeout(next, 150); };
        box.appendChild(btn);
    });

    document.getElementById('prev-btn').disabled = curIdx === 0;
    document.getElementById('next-btn').innerText = curIdx === questions.length - 1 ? "Vedi Risultati" : "Avanti";
}

// Navigazione
function changeQ(dir) {
    if (dir === 1) {
        const missingIndices = questions.map((q, i) => !answers[q.id] ? i : null).filter(i => i !== null);
        if (missingIndices.length > 0) {
            const nextEmpty = missingIndices.find(i => i > curIdx);
            if (nextEmpty !== undefined) {
                curIdx = nextEmpty;
                render();
                return; 
            } else {
                const firstEmpty = missingIndices[0];
                if (firstEmpty < curIdx) {
                    curIdx = firstEmpty;
                    render();
                    return;
                }
            }
        }
    }

    if (dir === 1 && curIdx === questions.length - 1) {
        showResults();
    } else {
        curIdx = Math.max(0, Math.min(questions.length - 1, curIdx + dir));
        render();
    }
}

function next() { 
    changeQ(1);
}

// Calcolo Risultati
function calculateResults() {
    let totals = { E:0, A:0, C:0, S:0, O:0, L:0 };
    let counts = { E:0, A:0, C:0, S:0, O:0, L:0 };
    questions.forEach(q => {
        let score = answers[q.id];
        if (score) {
            let finalScore = q.rev ? (6 - score) : score;
            totals[q.trait] += finalScore;
            counts[q.trait]++;
        }
    });
    let res = {};
    for (let t in totals) res[t] = (totals[t] / (counts[t] || 1)).toFixed(2);
    return res;
}

    const container = document.getElementById('traits-container');
    container.innerHTML = '';
    
    if (unansweredIds.length > 0) {
        container.innerHTML += `
            <div style="background: #fff3cd; color: #856404; padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #ffeeba;">
                <strong>Attenzione:</strong> Mancano ${unansweredIds.length} risposte.
                <button onclick="jumpToFirstMissing()" style="display:block; margin-top:10px; padding:8px; cursor:pointer; background:#856404; color:white; border:none; border-radius:5px;">
                    Vai alla prima domanda mancante
                </button>
            </div>`;
    }

    for (let t in scores) {
        const pct = (scores[t] / 5) * 100;
        container.innerHTML += `
            <div class="trait-result">
                <div style="display:flex; justify-content:space-between; font-weight:bold; font-size:0.9rem">
                    <span>${traitNames[t]}</span>
                    <span>${scores[t]} / 5.00</span>
                </div>
                <div class="bar-container"><div class="bar-fill" style="width:${pct}%"></div></div>
            </div>`;
    }

    const list = document.getElementById('review-list');
    list.innerHTML = '';
    questions.forEach((q, index) => {
        const isMissing = !answers[q.id];
        const div = document.createElement('div');
        div.className = 'review-item';
        if (isMissing) div.style.background = '#fff0f0';
        div.onclick = () => { curIdx = index; backToQuiz(); };
        div.innerHTML = `
            <span>
                <strong style="color:${isMissing ? 'red' : 'inherit'}">${q.id}.</strong> 
                ${q.text.substring(0,50)}...
            </span> 
            <span style="color:${isMissing ? 'red' : 'var(--primary)'}; font-weight:bold">
                ${answers[q.id] || 'MANCANTE'}
            </span>`;
        list.appendChild(div);
    });
}

function jumpToFirstMissing() {
    const idx = questions.findIndex(q => !answers[q.id]);
    if (idx !== -1) {
        curIdx = idx;
        backToQuiz();
    }
}

function backToQuiz() {
    document.getElementById('quiz-screen').classList.remove('hidden');
    document.getElementById('result-screen').classList.add('hidden');
    render();
}

function downloadReport() {
    const scores = calculateResults();
    let text = "REPORT TEST BIG FIVE (132 DOMANDE)\n" + "=".repeat(40) + "\n\n";
    for (let t in scores) text += `- ${traitNames[t]}: ${scores[t]}\n`;
    text += "\nDETTAGLIO RISPOSTE:\n";
    questions.forEach(q => {
        text += `Domanda ${q.id}: [${answers[q.id] || 'N/A'}] - ${q.text}\n`;
    });
    const blob = new Blob([text], {type: 'text/plain'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'Report_BigFive.txt';
    a.click();
}

window.addEventListener('keydown', (e) => {
    if (document.getElementById('quiz-screen').classList.contains('hidden')) return;
    const key = parseInt(e.key);
    if (key >= 1 && key <= 5) {
        answers[questions[curIdx].id] = key;
        render();
        setTimeout(next, 200);
    }
    if (e.key === "ArrowRight") next();
    if (e.key === "ArrowLeft") changeQ(-1);
});

// Avvio iniziale

render();
</script>
</body>
</html>
